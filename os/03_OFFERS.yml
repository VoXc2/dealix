  ai_ops_retainer:
    id: "RET"
    name: "AI Ops Retainer"
    name_ar: "خدمة الدعم والتطوير المستمر"
    tagline: "نظامكم يتحسن كل شهر — دعم، monitoring، تحسينات، وتوسعة"
    category: "retainer"
    price_sar_monthly:
      min: 8000
      max: 80000
      typical: 20000
    deliverables_monthly:
