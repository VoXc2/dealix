    name: "AI Governance Pack"
    name_ar: "حزمة حوكمة الذكاء الاصطناعي"
    tagline: "للشركات التي تريد AI آمناً وقابلاً للمراجعة والامتثال"
    category: "governance"
    price_sar:
      min: 15000
      max: 100000
      typical: 35000
    duration_days:
      min: 14
      max: 30
    best_for:
