repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pydantic
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^(tests/|dashboard/)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-ll, -c, pyproject.toml]
        additional_dependencies: [".[toml]"]
        exclude: ^tests/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ──────────────────────────────────────────────────────────────
  # Service Readiness Matrix — keep YAML and generated JSON in sync.
  # The validator refuses fake Live status + forbidden marketing
  # claims; the exporter regenerates landing/assets/data/service-readiness.json.
  # If either fails or the JSON diff is non-empty, the commit is blocked.
  # ──────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: verify-service-readiness-matrix
        name: Verify Service Readiness Matrix (no fake Live, no forbidden claims)
        entry: python scripts/verify_service_readiness_matrix.py
        language: system
        pass_filenames: false
        files: ^docs/registry/SERVICE_READINESS_MATRIX\.yaml$
      - id: export-service-readiness-json
        name: Regenerate landing/assets/data/service-readiness.json
        entry: python scripts/export_service_readiness_json.py
        language: system
        pass_filenames: false
        files: ^docs/registry/SERVICE_READINESS_MATRIX\.yaml$
      # ──────────────────────────────────────────────────────────────
      # Wave 20 PR4 — doctrine-as-code gates
      # ──────────────────────────────────────────────────────────────
      - id: doctrine-verifier-gate
        name: Doctrine layer must PASS (verify_all_dealix.py --system Doctrine)
        entry: python scripts/verify_all_dealix.py --system Doctrine
        language: system
        pass_filenames: false
      - id: no-inflated-marker-counts
        name: Marker counters must equal len(entries)
        entry: python -m pytest -q tests/test_no_inflated_marker_counts.py --no-header -p no:cacheprovider --override-ini=addopts=
        language: system
        pass_filenames: false
        files: ^data/(partner_outreach_log|first_invoice_log)\.json$
      - id: marker-files-have-git-provenance
        name: Marker entries must carry entry_id + git_author
        entry: python -m pytest -q tests/test_marker_files_have_git_provenance.py --no-header -p no:cacheprovider --override-ini=addopts=
        language: system
        pass_filenames: false
        files: ^data/(partner_outreach_log|first_invoice_log|capital_asset_index)\.json$
      - id: refresh-verifier-report
        name: Refresh landing/assets/data/verifier-report.json on marker change
        entry: python scripts/render_verifier_report.py
        language: system
        pass_filenames: false
        files: ^(data/.*\.json|scripts/verify_all_dealix\.py)$
