apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "dealix.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicas.api }}
  selector:
    matchLabels:
      {{- include "dealix.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dealix.api.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: "{{ .Release.Namespace }}"
            - name: CERBOS_PDP_URL
              value: "http://{{ .Release.Name }}-cerbos:{{ .Values.cerbos.port }}"
            {{- if .Values.postgres.external }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.secretName }}
                  key: DATABASE_URL
            {{- end }}
            {{- if .Values.redis.external }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.secretName }}
                  key: REDIS_URL
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecrets.secretName }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "dealix.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dealix.api.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: http
      name: http
