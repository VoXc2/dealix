# Single-host production compose — for founder-managed pilots before
# the Helm chart migration.
#
# Usage:
#   1. Provision a host with Docker + ≥ 4 GB RAM, ≥ 40 GB disk.
#   2. Copy /home/user/dealix/.env.example → /opt/dealix/.env and fill.
#   3. docker compose -f deploy/docker-compose.prod.yml up -d
#   4. The API answers at https://api.<domain>/ behind Cloudflare TLS.
#
# What it runs:
#   postgres  — Postgres 16 with pgvector + timescaledb extensions.
#   pgbouncer — transaction-mode pool (60 connections → 600 clients).
#   redis     — 7-alpine with AOF persistence.
#   cerbos    — policy decision sidecar listening on :3593.
#   meilisearch — per-tenant full-text indexes (T5f).
#   api       — FastAPI app under uvicorn, 2 workers.
#   web       — Next.js SSR frontend.
#
# Volumes persist Postgres + Redis + Meilisearch indices in
# /var/lib/dealix on the host.

version: "3.9"

x-restart-unless-stopped: &restart unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: *restart
    environment:
      POSTGRES_DB:       dealix
      POSTGRES_USER:     dealix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - /var/lib/dealix/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealix -d dealix"]
      interval: 10s
      timeout: 4s
      retries: 12

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    restart: *restart
    environment:
      DATABASE_URL: postgres://dealix:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dealix
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 600
      DEFAULT_POOL_SIZE: 60
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:6432:5432"

  redis:
    image: redis:7-alpine
    restart: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /var/lib/dealix/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.42.0
    restart: *restart
    command: ["server", "--config", "/etc/cerbos/.cerbos.yaml"]
    volumes:
      - ./cerbos:/etc/cerbos:ro
      - ../cerbos/policies:/policies:ro
    ports:
      - "127.0.0.1:3593:3593"

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: *restart
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: production
    volumes:
      - /var/lib/dealix/meilisearch:/meili_data

  api:
    image: ghcr.io/voxc2/dealix:${API_TAG:-latest}
    restart: *restart
    env_file:
      - /opt/dealix/.env
    environment:
      DATABASE_URL:  postgres://dealix:${POSTGRES_PASSWORD:-changeme}@pgbouncer:5432/dealix
      REDIS_URL:     redis://redis:6379/0
      CERBOS_PDP_URL: http://cerbos:3593
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY:  ${MEILI_MASTER_KEY:-changeme}
      UVICORN_WORKERS: "2"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  web:
    image: ghcr.io/voxc2/dealix-frontend:${WEB_TAG:-latest}
    restart: *restart
    environment:
      NEXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.dealix.me}
    ports:
      - "127.0.0.1:3000:3000"
