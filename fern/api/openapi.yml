# This file is a placeholder. The real OpenAPI document is generated by
# FastAPI at runtime (GET /openapi.json) and the CI workflow .github/workflows/sdk.yml
# snapshots it into fern/api/openapi.snapshot.json before invoking
# `fern generate --group sdks --version <ref>`.
#
# Local dev: run
#   curl -s http://localhost:8000/openapi.json > fern/api/openapi.snapshot.json
#   npx fern check
#   npx fern generate --group sdks
#
# CI: see .github/workflows/sdk.yml
