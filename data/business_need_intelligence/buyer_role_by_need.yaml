# Dealix — Buyer Role by Need
# For each of the 15 needs: the buyer roles most likely to own the problem,
# plus the angle that resonates with each. Roles are generic titles, not
# real contacts. No invented contacts. No promised outcomes.

version: 1
last_updated: "2026-06-03"

needs:
  lead_capture:
    primary_roles: ["Head of Growth", "Marketing Manager", "Founder / CEO"]
    secondary_roles: ["Sales Manager"]
    resonates_with: "كم فرصة تدخل ولا تُلتقط بمصدرها؟"

  lead_response:
    primary_roles: ["Sales Manager", "Founder / CEO", "Operations Manager"]
