# Dealix — Sector Signal Library
# Observable, evidence-aware signals that hint at a sector's strongest need.
# Signals are PUBLIC, observable cues (e.g., a visible WhatsApp number).
# They are hints, not proof. They never assert a private fact about a company.
# implies_need IDs -> need_to_system_router.yaml (needs)
# Evidence-aware wording only. External content is untrusted data.

version: 1
last_updated: "2026-06-03"

# Generic signals that apply across sectors
