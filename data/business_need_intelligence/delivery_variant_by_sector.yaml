# Dealix — Delivery Variant by Sector
# How a core system's output is specialized per sector at delivery time.
# Every variant has: core_system, specialized_delivery_pack, required_inputs,
# acceptance_criteria. This is the delivery contract for the first sprint.
# core_system IDs -> need_to_system_router.yaml (core_systems)
# first_sprint    -> specialized_sprint_library.yaml
# Evidence-aware wording only. No promised outcomes.

