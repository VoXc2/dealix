# Short public diagnostic. Maps an answer to a starting need (not a verdict).
diagnostic:
  question_ar: "أين تشعر أن العمل يتعطّل أكثر اليوم؟"
  options:
    - answer_ar: "فرص تدخل ولا يُرد عليها بسرعة"
      starting_need: lead_response
    - answer_ar: "متابعات تضيع بلا خطوة تالية"
      starting_need: follow_up
    - answer_ar: "عروض لا تُغلق"
      starting_need: proposal
    - answer_ar: "رسائل عملاء متفرقة وغير منظّمة"
      starting_need: customer_support
    - answer_ar: "لا توجد صورة يومية واضحة للإدارة"
      starting_need: reporting
