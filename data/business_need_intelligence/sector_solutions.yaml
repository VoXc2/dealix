# Dealix — Public Sector Solutions (web-facing projection)
# A SIMPLE, public-safe projection for the website. It exposes ONLY:
#   - 5 core systems
#   - sector solution cards (one need-led line + first sprint + primary system)
#   - a short diagnostic flow
# It deliberately hides the internal 30 systems to avoid cluttering the site.
# Evidence-aware wording only. No promised outcomes.

version: 1
last_updated: "2026-06-03"

