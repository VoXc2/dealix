version: "3.9"

services:
  dev:
    image: mcr.microsoft.com/devcontainers/python:1-3.11
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://dealix:dealix_local_dev_2026@db:5432/dealix
      REDIS_URL: redis://redis:6379/0
      CERBOS_PDP_URL: http://cerbos:3592
    depends_on:
      - db
      - redis
      - cerbos
    networks: [dealix]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dealix
      POSTGRES_PASSWORD: dealix_local_dev_2026
      POSTGRES_DB: dealix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealix"]
      interval: 5s
    networks: [dealix]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    networks: [dealix]

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.39.0
    command: ["server", "--config=/policies/.cerbos.yaml"]
    volumes:
      - ../cerbos/policies:/policies
    ports:
      - "3592:3592"
      - "3593:3593"
    networks: [dealix]

networks:
  dealix:
    driver: bridge
