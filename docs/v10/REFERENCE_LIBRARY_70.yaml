# Hard rule: every entry defaults to `inspiration_only` or `native_pattern`.
# `optional_adapter` requires Decision Pack §S6; `real_dependency` requires §S7.
#
# Schema (per entry):
#   id                          (snake_case, unique)
#   name                        (display)
#   repo                        (org/project)
#   category                    (one of the 12 layers)
#   dealix_value                (one-line why)
#   patterns_to_adapt           (list of patterns we borrow)
#   modules_impacted            (list of Dealix module paths)
#   tier                        (inspiration_only | native_pattern | optional_adapter | real_dependency)
#   priority                    (P0 | P1 | P2 | P3)
#   status                      (reviewed | selected | shipped | deferred | rejected)
#   risks                       (list)
#   safety_concerns             (list — defaults to [] unless tool can violate hard rules)
#   cost_concerns               (list — supply-chain / token / hosting / license)
#   license_to_verify           (string — common: MIT, Apache-2, BSD, AGPL)
#   integration_complexity      (low | medium | high)
#   founder_decision_required   (bool)
#   notes                       (string — concrete next-step guidance)

