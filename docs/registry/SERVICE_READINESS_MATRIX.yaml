    summary_ar: "حزمة أسبوعية للمديرين التنفيذيين: قرارات معلّقة، عوائق، مخاطر."
    summary_en: Weekly exec pack — pending decisions, blockers, risks.

  - id: partnership_growth
    name_ar: نمو الشراكات
    name_en: Partnership Growth
    customer_facing: true
    summary_ar: اكتشاف الشركاء، تقييم الملاءمة، تفعيل، وبطاقة أداء حيّة.
    summary_en: Partner scout, fit score, activation, and live scorecard.

  - id: full_control_tower
    name_ar: برج التحكم الكامل
