    proof_metrics: [inbound_replies_handled]
    api_endpoints: ["POST /api/v1/webhooks/linkedin-inbound"]
    frontend_surfaces: [founder daily card]
    data_dependencies: [lead_record_table]
    integration_dependencies: [unipile]
    owner: sami_assiri
    next_activation_step_ar: |
      التعاقد مع Unipile وإضافة webhook + اختبار dedupe للردود المتكرّرة.
    next_activation_step_en: |
