    customer_facing: true
    summary_ar: تحويل العروض المعتمدة إلى صفقات مغلقة مع دفع وتسليم.
    summary_en: Turn approved proposals into closed deals with payment and handoff.

  - id: executive_growth_os
    name_ar: نظام تشغيل القيادة التنفيذية
    name_en: Executive Growth OS
