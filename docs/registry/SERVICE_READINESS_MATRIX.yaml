# Dealix Service Readiness Matrix
# ═════════════════════════════════════════════════════════════════════════════
# Single source of truth for every service Dealix is preparing to run.
# - Status enum: live | pilot | partial | target | blocked | backlog
# - A service may be marked `live` ONLY if all 8 quality gates pass
#   (see docs/SERVICE_ACTIVATION_CONSOLE.md for the gate definitions).
# - Forbidden phrases (نضمن, guaranteed, blast, scrape, cold outreach, …)
#   are rejected by scripts/verify_service_readiness_matrix.py.
# - Edit this file → CI runs the validator → exporter regenerates
#   landing/assets/data/service-readiness.json → status.html re-renders.
#
# Owner: Sami Assiri
# Version: 1
# ═════════════════════════════════════════════════════════════════════════════

version: 1
owner: sami_assiri
last_updated: "2026-05-04"

bundles:
