# Dealix Service Readiness Matrix
# ================================
# Single source of truth for what each service actually is.
# Every claim in marketing/landing/decks must match this file.
#
# Status values: Live | Partial | Pilot | Target | Deprecated
# Gates:         Contract | Workflow | Abuse | Telemetry | Approval | Evidence | Executive
#
# Rule: A service cannot be marketed as "Live" unless ALL gates pass.
# CI: scripts/validate_readiness_matrix.py enforces consistency.

version: "1.0"
last_updated: "2026-04-18"
owner: "Sami Assiri"

# ─── Global policy ─────────────────────────────────────────────────────
policy:
  marketing_can_claim_live_only_if:
    - status: "Live"
    - contract_test: "Pass"
    - workflow_test: "Pass"
    - abuse_test: "Pass"
    - telemetry_visible: true
  weekly_review_required: true
  review_cadence: "Monday 09:00 Riyadh"

