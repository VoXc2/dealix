  - service_id: lead_intake_whatsapp
    name_ar: استقبال العملاء من واتساب
    name_en: Lead Intake — WhatsApp
    bundle: growth_starter
    capability_group: lead_intake
    status: partial
    customer_value_ar: |
      يلتقط رسائل العملاء الواردة على واتساب، يصنّف النيّة، ويجهّز
      الردّ أو كرت القرار للمؤسس — دون إرسال رسائل بدون موافقة.
    customer_value_en: |
      Captures inbound WhatsApp messages, classifies intent, and prepares
      a draft reply or founder decision card. Never initiates outreach.
    target_customer_ar: شركات B2B سعودية تستقبل استفسارات على واتساب.
    target_customer_en: Saudi B2B companies receiving inbound WhatsApp inquiries.
    what_it_does_ar: |
      ١) يستقبل الرسالة عبر Meta webhook رسمي. ٢) يتحقّق من التوقيع.
      ٣) يصنّف النيّة. ٤) يجهّز ردّاً للمراجعة أو كرت قرار. ٥) يحفظ سجلّ تدقيق.
    what_it_does_en: |
      1) Receives via official Meta webhook. 2) Verifies signature.
      3) Classifies intent. 4) Prepares draft or decision card. 5) Records audit trail.
    required_inputs:
      - WhatsApp Business Cloud webhook configured at Meta
      - WHATSAPP_VERIFY_TOKEN
      - WHATSAPP_APP_SECRET
    workflow_steps: [inbound_receive, signature_verify, intent_classify, draft_or_card, persist]
    channels: [whatsapp_inbound]
    safe_action_policy:
      - inbound_only
      - reply_drafts_require_approval
      - never_initiate_outside_24h_window
    approval_required: true
    blocked_actions:
      - cold_outreach_whatsapp
      - bulk_messaging
      - auto_send_outside_24h_window
    deliverables: [decision_card_in_founder_today, draft_arabic_reply, audit_trail_record]
    proof_metrics: [inbound_messages_handled, drafts_prepared, founder_approvals_collected]
    api_endpoints: ["POST /api/v1/webhooks/whatsapp"]
    frontend_surfaces: [founder daily card]
    data_dependencies: [lead_record_table, structlog_request_id]
    integration_dependencies: [meta_whatsapp_cloud_api]
    owner: sami_assiri
    next_activation_step_ar: |
      إضافة OpenTelemetry traces على كل دخول webhook + اختبار حدّ الإساءة
      لرقم opt-out. بعدها يصبح جاهزاً للترقية إلى Live.
    next_activation_step_en: |
      Add OpenTelemetry traces to every webhook entry and an abuse-boundary
      test for an opt-out flagged number. Then promote to Live.
    definition_of_live:
      - all 8 gates pass
      - inbound test recorded end-to-end
      - audit trail proven against a sample lead
    tests_required: [tests/test_whatsapp_signature.py]
    risks: [meta_policy_change, 24h_window_drift]
    sla: response_draft_within_5min_during_business_hours
    last_verified_at: "2026-05-04"
    evidence: [tests/test_whatsapp_signature.py, docs/WHATSAPP_OPERATOR_FLOW.md]

  - service_id: lead_intake_email
    name_ar: استقبال العملاء من البريد
    name_en: Lead Intake — Email
    bundle: growth_starter
    capability_group: lead_intake
    status: target
    customer_value_ar: |
      تحويل ردود البريد الواردة إلى عملاء محتملين منظّمين مع تتبع
      السلسلة (threading) — كقناة موازية لواتساب.
    customer_value_en: |
      Turns inbound email replies into structured leads with conversation
      threading — a parallel channel to WhatsApp.
    target_customer_ar: شركات يصلها استفسار العميل عبر البريد الرسمي.
    target_customer_en: Companies whose customers reach them via business email.
    what_it_does_ar: |
      ١) يستقبل البريد عبر inbound webhook. ٢) يستخرج التوقيع والسياق.
      ٣) يربط الرسالة بالسلسلة. ٤) يفتح أو يحدّث سجل العميل.
    what_it_does_en: |
      1) Receives email via inbound webhook. 2) Extracts signature/context.
      3) Threads to conversation. 4) Opens or updates the lead record.
    required_inputs:
      - SendGrid (or equivalent) inbound parse webhook
      - dedicated reply-to mailbox
    workflow_steps: [inbound_receive, parse_headers, thread_match, persist]
    channels: [email_inbound]
    safe_action_policy: [inbound_only, reply_drafts_require_approval]
    approval_required: true
    blocked_actions:
      - bulk_email_send
      - reply_without_review
    deliverables: [email_lead_record, thread_state_view]
    proof_metrics: [inbound_emails_handled, threads_linked]
    api_endpoints: ["POST /api/v1/webhooks/email-inbound"]
    frontend_surfaces: [founder daily card]
    data_dependencies: [lead_record_table]
    integration_dependencies: [sendgrid_inbound_parse]
    owner: sami_assiri
    next_activation_step_ar: |
      تكوين SendGrid inbound parse + إضافة محلّل MIME وتجارب threading.
    next_activation_step_en: |
      Configure SendGrid inbound parse, add a MIME parser, and threading tests.
    definition_of_live:
      - inbound mailbox active
      - threading test passes
      - audit trail proven
    tests_required: [tests/test_email_inbound_threading.py]
    risks: [inbound_spam_amplification]
    sla: lead_record_created_within_1min
    last_verified_at: "2026-05-04"
    evidence: [docs/WHATSAPP_OPERATOR_FLOW.md]

