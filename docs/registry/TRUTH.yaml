# Dealix — Truth Registry
# ═══════════════════════════════════════════════════════════════════
# مبدأ: لا ادّعاء "live" أو "production-ready" بدون 30 يوم telemetry
# Principle: No claim is "live" without 30 days of production telemetry
# ═══════════════════════════════════════════════════════════════════
#
# Schema:
#   id: string (unique)
#   claim: string (what we're asserting)
#   status: one of [planned, in_development, in_testing, staging, pilot, live, deprecated]
#   evidence: list of URLs or file paths proving the status
#   telemetry_days: int (days of production telemetry — must be >=30 for "live")
#   last_verified: ISO date
#   owner: email
#
# Rules:
#   - status=live REQUIRES telemetry_days >= 30
#   - status=pilot REQUIRES at least 1 real paying customer + evidence
#   - Any claim without evidence defaults to "planned"
#   - CI validates this file on every push (scripts/validate_truth_registry.py)
#
# ═══════════════════════════════════════════════════════════════════

