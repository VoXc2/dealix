      - id: "roi_measurable"
        description: "Value/ROI artifacts are linked to executive view."
        evidence_paths:
          - "auto_client_acquisition/value_capture_os/value_capture_dashboard.py"
          - "docs/BUSINESS_KPI_DASHBOARD_SPEC.md"
      - id: "forecasts_validated"
        description: "Forecasting capability exists."
        evidence_paths:
          - "auto_client_acquisition/revenue_science/churn_model.py"
          - "tests/test_service_readiness_score.py"
      - id: "strategic_alerts_working"
