cross_layer_checks:
  - id: "agents_follow_governance"
    description: "Agents obey governance policies and approvals."
    evidence_paths:
      - "tests/test_agent_autonomy_mvp_limit.py"
      - "tests/test_governance_runtime_decision.py"
      - "tests/test_governance_os_draft_gate.py"
  - id: "workflows_respect_permissions"
    description: "Workflow execution respects policy and permissions."
    evidence_paths:
      - "tests/test_workflow_os_v10.py"
      - "tests/test_secure_agent_runtime.py"
      - "auto_client_acquisition/governance_os/runtime_decision.py"
  - id: "memory_respects_tenant_isolation"
    description: "Memory and retrieval are tenant-isolation aware."
    evidence_paths:
      - "tests/test_tenant_isolation_v1.py"
      - "tests/unit/test_revenue_memory.py"
      - "api/middleware/tenant_isolation.py"
  - id: "evals_tied_to_business_impact"
    description: "Evaluation links to value and business KPIs."
    evidence_paths:
