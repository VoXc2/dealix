        description: "Evaluation assets and scripts are automated."
        evidence_paths:
          - "evals/governance_eval.yaml"
          - "scripts/verify_ai_output_quality.py"
      - id: "regression_tests_passing"
        description: "Regression guard tests are present."
        evidence_paths:
          - "tests/test_output_quality_gate.py"
          - "tests/test_readiness_gates.py"
      - id: "hallucination_monitored"
        description: "Knowledge/business answer quality eval exists."
        evidence_paths:
          - "evals/company_brain_eval.yaml"
          - "auto_client_acquisition/knowledge_os/knowledge_eval.py"
      - id: "workflow_success_measured"
        description: "Workflow success metrics are measured."
        evidence_paths:
          - "auto_client_acquisition/workflow_os/workflow_metrics.py"
          - "tests/test_workflow_os_v10.py"
      - id: "business_kpis_tracked"
        description: "Business KPI dashboard specs exist."
        evidence_paths:
          - "docs/BUSINESS_KPI_DASHBOARD_SPEC.md"
          - "tests/test_service_readiness_score.py"
  - id: executive
    title: "Executive Intelligence Layer"
    owner: "CEO Office + Reporting"
    kpis:
      - "executive_brief_generation_rate"
      - "forecast_accuracy"
      - "strategic_alert_latency_minutes"
      - "roi_measurement_coverage_rate"
    required_paths:
