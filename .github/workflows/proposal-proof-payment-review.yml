name: Proposal / Proof / Payment Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  commercial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pytest
      - name: Commercial gates
        run: |
          pytest -q \
            tests/test_payment_handoff_requires_approval.py \
            tests/test_proposal_maps_to_product_catalog.py \
            tests/test_proposal_requires_qualified_opportunity.py
