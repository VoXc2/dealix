name: Security Agent Red-Team

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/checks/check_prompt_injection_defense.py
      - run: python scripts/checks/check_agent_permissions.py
