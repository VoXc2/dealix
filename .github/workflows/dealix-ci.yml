name: Dealix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify structure
        run: |
          echo "Dealix CI started"
          [ -d backend ] && echo "✅ backend present" || echo "⚠️  backend missing"
          [ -d frontend ] && echo "✅ frontend present" || echo "⚠️  frontend missing"
          [ -f docs/registry/TRUTH.yaml ] && echo "✅ TRUTH.yaml present" || echo "⚠️  TRUTH.yaml missing"

  truth-validation:
    name: Truth Registry Validation
    runs-on: ubuntu-latest
    needs: smoke
    if: hashFiles('docs/registry/TRUTH.yaml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate Truth Registry
        run: python scripts/validate_truth_registry.py

  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    needs: smoke
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
      - name: Lint (ruff)
        run: ruff check app tests 2>&1 | tail -50 || echo "::warning::Lint issues found (non-blocking)"
        continue-on-error: true
      - name: Security scan (bandit)
        run: bandit -r app -ll -q 2>&1 | tail -30 || echo "::warning::Security warnings"
        continue-on-error: true
      - name: Run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_dealix.db
          DEALIX_INTERNAL_API_TOKEN: "ci-token"
          JWT_SECRET: "ci-test-secret-not-for-production-use"
          ENVIRONMENT: "test"
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q --tb=line --no-header || echo "::warning::Some tests failing"
          else
            echo "No tests directory"
          fi
        continue-on-error: true

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    needs: smoke
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "::warning::Lint issues"
        continue-on-error: true
      - name: TypeCheck
        run: npx tsc --noEmit || echo "::warning::Type errors"
        continue-on-error: true
