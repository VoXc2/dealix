# Manual full local-style verification (Docker + Python gates + Next.js + Playwright).
# Run from Actions → "Local stack verify" → Run workflow.
# Same surface as: bash scripts/dealix_local_stack_verify.sh --teardown
name: Local stack verify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run full stack verify script
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: bash scripts/dealix_local_stack_verify.sh --teardown
