name: Security lint

on:
  pull_request:
    paths:
      - "api/**"
      - "core/**"
      - "dealix/**"
      - "integrations/**"
      - "auto_client_acquisition/**"
      - ".semgrep/**"
  push:
    branches: [main]

jobs:
  semgrep:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install semgrep>=1.85

      - name: Run Dealix custom ruleset
        run: |
          semgrep scan --config .semgrep/dealix.yaml \
            --error \
            --exclude '**/test_*.py' \
            --exclude 'tests/' \
            --exclude '*.pyc' \
            api/ core/ dealix/ integrations/ auto_client_acquisition/

  bandit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: python -m pip install "bandit[toml]>=1.7.9"
      - name: Run Bandit (high severity only)
        run: bandit -r api/ core/ dealix/ -ll -ii --exclude '**/tests/**'
