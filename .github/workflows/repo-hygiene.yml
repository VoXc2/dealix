name: Repo Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-key-files:
    name: Verify required files exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check key files
        run: |
          missing=0
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md docker-compose.yml; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required files are missing."
            exit 1
          fi

  block-secrets-files:
    name: Block .env / .pem / .key files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden file extensions
        run: |
          forbidden=$(git ls-files | grep -E '\.(env|pem|key|crt|p12|pfx)$' | grep -v '\.env\.example' || true)
          if [ -n "$forbidden" ]; then
            echo "::error::Forbidden files detected in tracked files:"
            echo "$forbidden"
            exit 1
          fi
          echo "No forbidden files found."

  block-secret-patterns:
    name: Block secret patterns in tracked files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for high-confidence secret patterns
        run: |
          # أنماط عالية الدقة فقط (مفاتيح حقيقية) — لا نلتقط أمثلة في docs أو tests
          patterns=(
            'BEGIN RSA PRIVATE KEY'
            'BEGIN OPENSSH PRIVATE KEY'
            'BEGIN DSA PRIVATE KEY'
            'BEGIN EC PRIVATE KEY'
            'sk-proj-[a-zA-Z0-9]{40,}'
            'ghp_[a-zA-Z0-9]{36}'
            'gho_[a-zA-Z0-9]{36}'
            'xoxb-[0-9]{10,}-[0-9]{10,}'
            'AKIA[A-Z0-9]{16}'
          )
          # استبعد: docs, examples, tests, seed data, workflows, memory/runbooks
          EXCLUDE='\.example$|\.md$|tests/|test_|seed_|\.github/workflows/|memory/runbooks/|docs/'
          found=0
          for pattern in "${patterns[@]}"; do
            matches=$(git ls-files -z | xargs -0 grep -lE "$pattern" 2>/dev/null | grep -vE "$EXCLUDE" || true)
            if [ -n "$matches" ]; then
              echo "::error::High-confidence secret pattern '$pattern' found in:"
              echo "$matches"
              found=1
            fi
          done
          if [ "$found" -eq 1 ]; then
            echo "::error::Real secrets detected. Rotate them immediately and remove from history."
            exit 1
          fi
          echo "No secret patterns found."
