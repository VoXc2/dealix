name: dealix-ultimate-os-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secrets check
        run: python3 scripts/check_no_secrets.py
      - name: Env check (demo)
        run: python3 scripts/check_required_env.py --mode demo
      - name: Master verification
        run: python3 scripts/verify_dealix_ultimate_os.py
      - name: Daily operator (demo)
        run: python3 scripts/dealix_daily_operator.py --mode demo
      - name: AI evals (demo)
        run: python3 scripts/run_ai_evals.py --mode demo
      - name: Content calendar
        run: python3 scripts/generate_content_calendar.py --days 30
      - name: Campaign pack
        run: python3 scripts/generate_campaign_pack.py --campaign revenue-os --lang both
      - name: Demo pack
        run: python3 scripts/generate_demo_pack.py --lang both
      - name: Health snapshot
        run: python3 scripts/generate_health_snapshot.py
      - name: Release notes
        run: python3 scripts/generate_release_notes.py
      - name: Source audit
        run: python3 scripts/audit_lead_sources.py
      - name: Backup
        run: python3 scripts/backup_business_data.py
      - name: Data integrity
        run: python3 scripts/check_data_integrity.py
      - name: Production readiness
        run: python3 scripts/production_readiness_check.py
      - name: Pre-push guard
        run: python3 scripts/pre_push_guard.py
      - name: Test: no auto-send
        run: |
          python3 -c "from tests.test_no_auto_send import test_no_auto_send; test_no_auto_send(); print('OK')"
      - name: Test: AI router fallback
        run: |
          python3 -c "from tests.test_ai_router_fallback import test_router_fallback_to_deterministic, test_router_call_returns_safe_output, test_ai_evals_pass; test_router_fallback_to_deterministic(); test_router_call_returns_safe_output(); test_ai_evals_pass(); print('OK')"
