name: ready-to-launch

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Compute Launch Score (Full Launch requires >= 90)
        run: python dealix.py launch-score --min 90
      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ready-to-launch-scorecard
          path: reports/operating_factory/READY_TO_LAUNCH_SCORECARD.md
