name: Performance budgets

on:
  pull_request:
    paths:
      - "api/**"
      - "core/**"
      - "dealix/**"
      - "locustfile.py"
      - "tests/perf/**"
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC

jobs:
  k6:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dealix
          POSTGRES_PASSWORD: dealix_local_dev_2026
          POSTGRES_DB: dealix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dealix"
          --health-interval 5s
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot API in background
        env:
          APP_ENV: test
          APP_SECRET_KEY: test_only_change_me_to_64_byte_hex_abcdefghijklmnop
          JWT_SECRET_KEY: test_only_change_me_to_64_byte_hex_abcdefghijklmnop
          DATABASE_URL: postgresql+asyncpg://dealix:dealix_local_dev_2026@localhost:5432/dealix
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test
          OPENAI_API_KEY: test
        run: |
          nohup uvicorn api.main:app --host 0.0.0.0 --port 8000 >uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/v1/public/health >/dev/null; then
              echo "API is up"; break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.53.0/k6-v0.53.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.53.0-linux-amd64/k6 /usr/local/bin/k6

      - name: k6 smoke + budgets
        run: K6_BASE_URL=http://localhost:8000 k6 run tests/perf/k6_smoke.js

      - name: Show API log on failure
        if: failure()
        run: tail -200 uvicorn.log || true
