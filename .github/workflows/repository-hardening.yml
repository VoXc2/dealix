name: Repository Hardening

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          # Secret detection is owned by the dedicated Gitleaks job above;
          # restrict Trivy to vulnerability scanning to avoid duplicate
          # false positives on key *patterns* in tests/scripts.
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          # Advisory (report-only), consistent with the Trivy step in
          # docker-build.yml. Re-enable exit-code '1' after triaging/.trivyignore.
          exit-code: '0'
