# Weekly maximum governed autonomous stack (Sunday UTC)
name: Founder complete autonomous weekly

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  complete-autonomous:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyyaml
      - name: Complete autonomous week (skip duplicate commercial shell in CI)
        run: |
          python3 scripts/run_dealix_complete_autonomous_day.py \
            --weekly \
            --skip-commercial-day \
            --json
      - name: Upload briefs
        uses: actions/upload-artifact@v4
        with:
          name: founder-complete-autonomous-briefs
          path: |
            data/founder_briefs/strongest_ops_*.md
            data/founder_briefs/strongest_ops_*.json
            data/founder_briefs/autopilot_*.md
            data/founder_briefs/unified_founder_day_*.json
            data/founder_briefs/autonomous_ops_*.md
          if-no-files-found: ignore
