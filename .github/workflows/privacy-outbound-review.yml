name: Privacy & Outbound Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pytest pyyaml
      - name: Suppression + schema validation
        run: |
          pytest -q \
            tests/test_suppression_blocks_sending.py \
            tests/test_outreach_suppression_blocks_send.py \
            tests/test_schemas_and_data.py
      - name: Privacy docs present
        run: |
          test -f docs/privacy/SAUDI_PDPL_OUTBOUND_POLICY_AR.md
          test -f docs/privacy/RETENTION_AND_DELETION_POLICY_AR.md
          test -f schemas/suppression.schema.json
