name: Daily Snapshot

# Writes a silent daily audit-trail snapshot of system state.
# Wave 10.8 §29.3: snapshot is uploaded as a workflow artifact
# (90-day retention) instead of committed to main, because
# branch protection (correctly) refuses bot pushes to main.
# Founders can fetch any past snapshot via `gh run download <run-id>`.
# Runs at 5AM UTC (= 8AM KSA) — one hour after the founder digest
# at 4AM UTC to avoid contention.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

# Read-only — the workflow only produces an artifact, never pushes.
permissions:
  contents: read

concurrency:
  group: dealix-daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    name: Write daily snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build snapshot
        id: build
        run: |
          set -e
          mkdir -p docs/snapshots
          python3 scripts/dealix_snapshot.py
          DATE="$(date -u +%Y-%m-%d)"
          FILE="docs/snapshots/${DATE}.json"
          # Wave 10.8.1 fix (Codex P2 review on PR #190):
          # the build step MUST fail when the snapshot file is missing,
          # so a silent dropout in scripts/dealix_snapshot.py doesn't
          # produce a green workflow with no audit-trail artifact.
          if [ ! -f "$FILE" ]; then
            echo "❌ snapshot file missing: $FILE"
            echo "    scripts/dealix_snapshot.py exited cleanly but produced no output."
            echo "    This is a regression in snapshot generation — investigate immediately."
            exit 1
          fi
          echo "snapshot_path=$FILE" >> "$GITHUB_OUTPUT"
          echo "snapshot_date=$DATE" >> "$GITHUB_OUTPUT"
          echo "✅ snapshot written: $FILE ($(wc -c < "$FILE") bytes)"

      - name: Upload snapshot as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          # Wave 10.8 §29.3: 90-day retention is enough audit-trail signal
          # for forensics; queryable via `gh run download <run-id>`.
          name: dealix-daily-snapshot-${{ steps.build.outputs.snapshot_date }}
          path: ${{ steps.build.outputs.snapshot_path }}
          retention-days: 90
          if-no-files-found: error
