name: Finance & GTM Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  finance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pytest
      - name: No guaranteed claims in finance/GTM docs
        run: pytest -q tests/test_no_claims_in_docs.py
      - name: Finance docs present
        run: |
          test -f docs/finance/COMPLETE_GTM_FINANCE_OS_AR.md
          test -f docs/finance/CAC_PAYBACK_MODEL_AR.md
