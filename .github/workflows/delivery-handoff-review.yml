name: Delivery Handoff Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pytest
      - name: Delivery / CS / renewal gates
        run: |
          pytest -q \
            tests/test_delivery_handoff_required.py \
            tests/test_customer_success_handoff_required.py \
            tests/test_renewal_requires_delivered_value.py
