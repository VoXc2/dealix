name: Deliverability Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  deliverability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pytest
      - name: Outreach safety tests
        run: |
          pytest -q \
            tests/test_outreach_no_cold_whatsapp.py \
            tests/test_outreach_unsubscribe_required.py \
            tests/test_outreach_suppression_blocks_send.py
      - name: Deliverability docs present
        run: |
          test -f docs/outreach/DELIVERABILITY_READINESS_CHECKLIST.md
          test -f docs/outreach/SENDING_RAMP_PLAN_AR.md
