name: Deploy to Railway

# Deploys Dealix backend to Railway using Railway CLI.
#
# Setup (one-time, by Sami):
#   1. Go to https://railway.app/account/tokens
#   2. Create a new token named "github-deploy"
#   3. Copy the token
#   4. Go to https://github.com/VoXc2/dealix/settings/secrets/actions
#   5. Add New repository secret: RAILWAY_TOKEN = <paste token>
#   6. Optional: Add RAILWAY_SERVICE_NAME = dealix (if service name differs)
#
# After setup: every push to main auto-deploys, OR trigger manually
# via Actions tab → "Deploy to Railway" → Run workflow.

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "core/**"
      - "dealix/**"
      - "auto_client_acquisition/**"
      - "autonomous_growth/**"
      - "integrations/**"
      - "db/**"
      - "cli.py"
      - "Dockerfile"
      - "railway.json"
      - "railway.toml"
      - "Procfile"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      service:
        description: "Railway service name"
        required: false
        default: "dealix"
        type: string

jobs:
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    # Only run if RAILWAY_TOKEN is configured
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for RAILWAY_TOKEN
        id: check_token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not configured. Skipping deploy."
            echo "token_present=false" >> $GITHUB_OUTPUT
            echo ""
            echo "To enable auto-deploy:"
            echo "1. Get token from https://railway.app/account/tokens"
            echo "2. Add as GitHub secret: RAILWAY_TOKEN"
            exit 0
          fi
          echo "token_present=true" >> $GITHUB_OUTPUT

      - name: Install Railway CLI
        if: steps.check_token.outputs.token_present == 'true'
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway auth
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway whoami || echo "Auth check failed — token may be invalid"

      - name: Deploy to Railway
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE="${{ inputs.service || 'dealix' }}"
          echo "Deploying to service: $SERVICE"
          railway up --service "$SERVICE" --detach || {
            echo "::error::Railway deploy failed. Check service name and token."
            exit 1
          }

      - name: Wait for deployment to become active
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting 60 seconds for deployment to start..."
          sleep 60
          railway status || true

      - name: Smoke test /healthz
        id: healthz
        if: steps.check_token.outputs.token_present == 'true'
        run: |
          URL="${{ vars.RAILWAY_PUBLIC_URL || 'https://api.dealix.me' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing trust layer on $URL"

          for i in {1..12}; do
            hz=$(curl -sS --max-time 10 "$URL/healthz" || echo "")
            ver=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$URL/version" || echo "000")
            meta=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$URL/api/v1/meta" || echo "000")
            echo "Attempt $i: healthz=$(echo "$hz" | head -c 80) version=$ver meta=$meta"
            if [ "$ver" = "200" ] && [ "$meta" = "200" ] && echo "$hz" | grep -q '"version"'; then
              echo "✅ trust layer live (/healthz+version, /version, /api/v1/meta)"
              exit 0
            fi
            sleep 15
          done

          echo "::error::Trust layer not ready after 3 minutes (/version /api/v1/meta /healthz version field)."
          exit 1

      - name: Post-deploy smoke pack
        if: steps.check_token.outputs.token_present == 'true'
        env:
          BASE_URL: ${{ steps.healthz.outputs.url }}
        run: |
          set -euo pipefail
          echo "→ /api/v1/pricing/plans"
          curl -fsS --max-time 10 "$BASE_URL/api/v1/pricing/plans" | head -c 400; echo

          echo "→ /api/v1/prospect/search-diag"
          # Tier readiness is informational; non-fatal if optional providers are absent
          curl -fsS --max-time 10 "$BASE_URL/api/v1/prospect/search-diag" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('tier1=', d.get('tier1_ready'), 'tier2=', d.get('tier2_ready'))"

          echo "→ webhook 401-on-bad-signature (security smoke)"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST "$BASE_URL/api/v1/webhooks/moyasar" \
            -H "Content-Type: application/json" \
            -H "X-Moyasar-Signature: bogus" \
            -d '{"event":"payment_paid","data":{}}')
          if [ "$code" != "401" ] && [ "$code" != "403" ]; then
            echo "::error::Moyasar webhook accepted bad signature (got $code, expected 401/403)"
            exit 1
          fi
          echo "✓ webhook rejected bad signature"

          echo "✅ post-deploy smoke pack passed"
