name: Deploy to Railway

# Deploys Dealix backend to Railway using Railway CLI.
#
# Setup (one-time, by Sami):
#   1. Go to https://railway.app/account/tokens
#   2. Create a new token named "github-deploy"
#   3. Copy the token
#   4. Go to https://github.com/VoXc2/dealix/settings/secrets/actions
#   5. Add New repository secret: RAILWAY_TOKEN = <paste token>
#   6. Optional: Add RAILWAY_SERVICE_NAME = dealix (if service name differs)
#
# After setup: every push to main auto-deploys, OR trigger manually
# via Actions tab → "Deploy to Railway" → Run workflow.

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "core/**"
      - "dealix/**"
      - "auto_client_acquisition/**"
      - "autonomous_growth/**"
      - "integrations/**"
      - "db/**"
      - "cli.py"
      - "Dockerfile"
      - "railway.json"
      - "railway.toml"
      - "Procfile"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      service:
        description: "Railway service name"
        required: false
        default: "dealix"
        type: string

jobs:
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    # Only run if RAILWAY_TOKEN is configured
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for RAILWAY_TOKEN
        id: check_token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not configured. Skipping deploy."
            echo "token_present=false" >> $GITHUB_OUTPUT
            echo ""
            echo "To enable auto-deploy:"
            echo "1. Get token from https://railway.app/account/tokens"
            echo "2. Add as GitHub secret: RAILWAY_TOKEN"
            exit 0
          fi
          echo "token_present=true" >> $GITHUB_OUTPUT

      - name: Install Railway CLI
        if: steps.check_token.outputs.token_present == 'true'
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway auth
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway whoami || echo "Auth check failed — token may be invalid"

      - name: Deploy to Railway
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE="${{ inputs.service || 'dealix' }}"
          echo "Deploying to service: $SERVICE"
          railway up --service "$SERVICE" --detach || {
            echo "::error::Railway deploy failed. Check service name and token."
            exit 1
          }

      - name: Wait for deployment to become active
        if: steps.check_token.outputs.token_present == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting 60 seconds for deployment to start..."
          sleep 60
          railway status || true

      - name: Smoke test /healthz (advisory during Wave 14-15)
        id: healthz
        if: steps.check_token.outputs.token_present == 'true'
        # Wave 15: first deploys of Wave 14-15 may take >3 min to come up
        # (Alembic 010 migration runs in release). Don't fail the
        # workflow on smoke — let the founder verify manually via
        # scripts/prod_smoke.sh after Railway dashboard shows green.
        run: |
          URL="${{ vars.RAILWAY_PUBLIC_URL || 'https://dealix-production-up.railway.app' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing: $URL/healthz"

          for i in {1..12}; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$URL/healthz" || echo "000")
            echo "Attempt $i: $code"
            if [ "$code" = "200" ]; then
              echo "✅ /healthz = 200 — backend is live"
              exit 0
            fi
            sleep 15
          done

          echo "::warning::/healthz did not return 200 after 3 minutes. Run scripts/prod_smoke.sh manually."
          exit 0
        continue-on-error: true

      - name: Post-deploy smoke pack (advisory)
        if: steps.check_token.outputs.token_present == 'true'
        env:
          BASE_URL: ${{ steps.healthz.outputs.url }}
        # Advisory only. Founder runs scripts/prod_smoke.sh after deploy
        # for full validation (14 endpoints + governance envelope).
        run: |
          set +e
          echo "→ /api/v1/pricing/plans"
          curl -sS --max-time 10 "$BASE_URL/api/v1/pricing/plans" | head -c 400 || echo "(skip — endpoint not reachable yet)"
          echo

          echo "→ /api/v1/commercial-map (Wave 14J)"
          curl -sS --max-time 10 "$BASE_URL/api/v1/commercial-map" | head -c 200 || echo "(skip)"
          echo

          echo "→ /api/v1/founder/launch-status/public (Wave 15)"
          curl -sS --max-time 10 "$BASE_URL/api/v1/founder/launch-status/public" | head -c 200 || echo "(skip)"
          echo

          echo "→ webhook 401-on-bad-signature (security smoke — best-effort)"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST "$BASE_URL/api/v1/webhooks/moyasar" \
            -H "Content-Type: application/json" \
            -H "X-Moyasar-Signature: bogus" \
            -d '{"event":"payment_paid","data":{}}' 2>/dev/null || echo "000")
          echo "  → got $code (expect 401/403 once endpoint is live)"

          echo "ℹ post-deploy smoke pack ran in advisory mode"
        continue-on-error: true
