name: Enterprise Control Plane

on:
  push:
    branches: [main, dealix-v3-autonomous-revenue-os]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Verify Enterprise Control Plane
        env:
          APP_ENV: test
          APP_DEBUG: "false"
        run: bash scripts/verify_enterprise_control_plane.sh
