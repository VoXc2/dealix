name: Enterprise Control Plane

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Verify Enterprise Control Plane
        run: bash scripts/verify_enterprise_control_plane.sh
