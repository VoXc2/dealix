name: Enterprise Control Plane

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Compile check
        run: python -m compileall -q api auto_client_acquisition core

      - name: API import health
        env:
          APP_ENV: test
        run: python -c "from api.main import app; print('api import ok')"

      - name: Ruff lint
        run: ruff check api auto_client_acquisition core

      - name: Test collection (no aborting collection errors)
        env:
          APP_ENV: test
        run: python -m pytest --co -q --no-cov

      - name: Enterprise Control Plane verification gate
        env:
          APP_ENV: test
        run: bash scripts/verify_enterprise_control_plane.sh
