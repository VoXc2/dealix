name: Founder Content Weekly

# Weekly commercial content pack (drafts only — no publish). ~09:00 KSA Friday (06:00 UTC).

on:
  schedule:
    - cron: "0 6 * * 5"
  workflow_dispatch:

concurrency:
  group: founder-content-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  content-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Generate commercial content pack
        run: python scripts/generate_commercial_content_pack.py

      - name: Upload draft artifacts
        uses: actions/upload-artifact@v4
        with:
          name: founder-content-weekly-${{ github.run_id }}
          path: |
            docs/commercial/operations/drafts/
          retention-days: 30
          if-no-files-found: warn
