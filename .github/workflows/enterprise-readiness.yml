name: Enterprise Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: read

jobs:
  enterprise-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify enterprise operating layer
        run: |
          python scripts/verify_enterprise_operating_layer.py
          python scripts/dealix_enterprise_readiness.py
      - name: Upload readiness report
        uses: actions/upload-artifact@v7
        with:
          name: enterprise-readiness
          path: reports/company_os/daily/ENTERPRISE_READINESS.*
