name: CI

on:
  push:
    branches: [main, dealix-v3-autonomous-revenue-os, "claude/**"]
  pull_request:
    branches: [main, dealix-v3-autonomous-revenue-os, "claude/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Compile check (syntax)
        run: python -m compileall api auto_client_acquisition

      - name: Import + collection guard (catches shipped-shell routers)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
        run: |
          # compileall only checks syntax; this proves the app actually boots
          # and every test module imports cleanly (0 collection errors).
          python -c "import api.main; print('api.main import OK')"
          pytest --co -q --no-cov 2>&1 | tail -5
          pytest --co -q --no-cov >/dev/null

      - name: Alembic single head
        run: python scripts/check_alembic_single_head.py

      - name: Module sprawl guard (no new *_vN modules)
        run: python scripts/check_no_new_vn_modules.py

      - name: Verify Service Readiness Matrix
        run: python scripts/verify_service_readiness_matrix.py

      - name: Quick regression bundle (revenue memory + routing + integrations + v5 + compliance)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest tests/test_app_boot.py tests/test_pg_event_store.py tests/test_model_router.py tests/test_integrations.py tests/test_v5_layers.py tests/unit/test_compliance_os.py tests/test_isolated_pg_event_store.py -q --no-cov

      - name: Export Service Readiness JSON
        run: |
          python scripts/export_service_readiness_json.py
          # Fail CI if the committed JSON is stale relative to the YAML.
          git diff --exit-code -- landing/assets/data/service-readiness.json

      - name: SEO audit (required-gap must be 0; advisory perimeter locked)
        run: |
          python scripts/seo_audit.py
          # Fail CI if the committed SEO report is stale.
          git diff --exit-code -- docs/SEO_AUDIT_REPORT.json

      - name: Tests with coverage gate
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest -q \
            --cov=api --cov=core --cov=db --cov=integrations \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: In-process API smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python scripts/smoke_inprocess.py

      - name: Embeddings pipeline placeholder
        run: python scripts/embeddings_pipeline_placeholder.py

      - name: Deterministic eval smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python scripts/run_evals.py

      - name: AI-quality eval harness (governance + value + arabic gate)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
        run: python evals/runner.py
