name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Security scanning — runs first, blocks everything if secrets leak
  # ──────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for secret scanning

      - name: Gitleaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: detect-secrets scan
        uses: reviewdog/action-detect-secrets@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          fail_on_error: true
        continue-on-error: true

      - name: Trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ──────────────────────────────────────────────────────────────
  # Lint & type-check
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Mypy
        run: mypy core auto_client_acquisition autonomous_growth integrations api
        continue-on-error: true  # non-blocking initially

      - name: Bandit (Python security)
        run: bandit -c pyproject.toml -r core auto_client_acquisition autonomous_growth integrations api -ll

  # ──────────────────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          APP_ENV: test
          ANTHROPIC_API_KEY: test-key
          DEEPSEEK_API_KEY: test-key
          GROQ_API_KEY: test-key
          GLM_API_KEY: test-key
          GOOGLE_API_KEY: test-key
        run: pytest -v --cov --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # Docker build sanity
  # ──────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-company-saudi:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
