name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  factory:
    name: Python factory checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Regenerate data layer from seeds (must be reproducible)
        run: python dealix.py seed
      - name: Data-contract + gate checks (pytest)
        run: pytest -q
