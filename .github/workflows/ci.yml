name: Dealix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository structure
        run: |
          echo "Dealix CI started"
          ls -la
          echo "Backend exists: $([ -d backend ] && echo yes || echo no)"
          echo "Frontend exists: $([ -d frontend ] && echo yes || echo no)"

  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    needs: smoke
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_dealix.db
          DEALIX_INTERNAL_API_TOKEN: "ci-token"
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q --tb=line --no-header || echo "Tests completed with issues (non-blocking for now)"
          else
            echo "No tests directory"
          fi
        continue-on-error: true

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    needs: smoke
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci || npm install
        continue-on-error: true
      - name: Lint
        run: npm run lint || echo "Lint skipped"
        continue-on-error: true
