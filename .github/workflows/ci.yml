name: CI

on:
  push:
    branches: [main, dealix-v3-autonomous-revenue-os]
  pull_request:
    branches: [main, dealix-v3-autonomous-revenue-os]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Compile check
        run: python -m compileall api auto_client_acquisition

      - name: Alembic single head
        run: python scripts/check_alembic_single_head.py

      - name: Verify Service Readiness Matrix
        run: python scripts/verify_service_readiness_matrix.py

      - name: Quick regression bundle (revenue memory + routing + integrations + v5 + compliance)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest tests/test_pg_event_store.py tests/test_model_router.py tests/test_integrations.py tests/test_v5_layers.py tests/unit/test_compliance_os.py tests/test_isolated_pg_event_store.py -q --no-cov

      - name: Export Service Readiness JSON
        run: |
          python scripts/export_service_readiness_json.py
          # Fail CI if the committed JSON is stale relative to the YAML.
          git diff --exit-code -- landing/assets/data/service-readiness.json

      - name: SEO audit (required-gap must be 0; advisory perimeter locked)
        run: |
          python scripts/seo_audit.py
          # Fail CI if the committed SEO report is stale.
          git diff --exit-code -- docs/SEO_AUDIT_REPORT.json

      - name: Master Verifier (refresh + drift gate)
        run: |
          python scripts/render_verifier_report.py
          # Fail CI if the committed verifier report is stale.
          git diff --exit-code -- landing/assets/data/verifier-report.json

      - name: Trust badges (refresh + drift gate)
        run: |
          python scripts/render_trust_badges.py
          # Fail CI if the committed badges are stale.
          git diff --exit-code -- landing/assets/badges/

      - name: Public sitemap (refresh + drift gate)
        env:
          DEALIX_PUBLIC_ORIGIN: https://dealix.example.com
        run: |
          python scripts/render_public_sitemap.py
          git diff --exit-code -- landing/sitemap.xml

      - name: Partner kit zip (rebuild + drift gate)
        run: |
          python scripts/build_partner_kit_zip.py
          git diff --exit-code -- landing/assets/downloads/dealix-partner-kit-v1.zip

      - name: Tests with coverage gate
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest -q \
            --cov=api --cov=core --cov=db --cov=integrations \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: In-process API smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python scripts/smoke_inprocess.py

      - name: Embeddings pipeline placeholder
        run: python scripts/embeddings_pipeline_placeholder.py

      - name: Deterministic eval smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python scripts/run_evals.py

  # ───────────────────────────────────────────────────────────────
  # Wave 20 PR4 — Doctrine-as-Code Gate (required for merge)
  # The eleven non-negotiables become non-bypassable here. This job
  # runs independently from the main test job so a failure surfaces
  # immediately with a clear, founder-readable message.
  # ───────────────────────────────────────────────────────────────
  doctrine-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimum deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Doctrine layer must PASS
        run: python scripts/verify_all_dealix.py --system Doctrine

      - name: Governance OS layer must PASS
        run: python scripts/verify_all_dealix.py --system "Governance OS"

      - name: Marker counts must equal len(entries)
        run: |
          python -m pytest -q \
            tests/test_no_inflated_marker_counts.py \
            --no-header -p no:cacheprovider --override-ini=addopts=

      - name: Marker entries must carry git provenance
        run: |
          python -m pytest -q \
            tests/test_marker_files_have_git_provenance.py \
            --no-header -p no:cacheprovider --override-ini=addopts=

      - name: Doctrine control mapping must be complete
        run: |
          python -m pytest -q \
            tests/test_doctrine_control_mapping_complete.py \
            tests/test_agent_requires_identity_card.py \
            tests/test_capital_asset_index_valid.py \
            --no-header -p no:cacheprovider --override-ini=addopts=

      - name: No forbidden features in product code
        run: |
          python -m pytest -q \
            tests/test_no_forbidden_features_in_diff.py \
            --no-header -p no:cacheprovider --override-ini=addopts=

      - name: Capital asset index validates
        run: python scripts/validate_capital_assets.py
