name: CI

on:
  push:
    branches: [main, dealix-v3-autonomous-revenue-os]
  pull_request:
    branches: [main, dealix-v3-autonomous-revenue-os]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Compile check
        run: python3 -m compileall api auto_client_acquisition

      - name: Alembic single head
        run: python scripts/check_alembic_single_head.py

      - name: Verify Service Readiness Matrix
        run: python3 scripts/verify_service_readiness_matrix.py

      - name: Quick regression bundle (revenue memory + routing + integrations + v5 + compliance)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest tests/test_pg_event_store.py tests/test_model_router.py tests/test_integrations.py tests/test_v5_layers.py tests/unit/test_compliance_os.py tests/test_isolated_pg_event_store.py -q --no-cov

      - name: Export Service Readiness JSON
        run: |
          python3 scripts/export_service_readiness_json.py
          # Fail CI if the committed JSON is stale relative to the YAML.
          git diff --exit-code -- landing/assets/data/service-readiness.json

      - name: SEO audit (required-gap must be 0; advisory perimeter locked)
        run: |
          python3 scripts/seo_audit.py
          # Fail CI if the committed SEO report is stale.
          git diff --exit-code -- docs/SEO_AUDIT_REPORT.json

      - name: Tests with coverage gate
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: |
          pytest -q \
            --cov=api --cov=core --cov=db --cov=integrations \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: In-process API smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python3 scripts/smoke_inprocess.py

      - name: Embeddings pipeline placeholder
        run: python3 scripts/embeddings_pipeline_placeholder.py

      - name: Deterministic eval smoke
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
        run: python3 scripts/run_evals.py

      - name: Landing + Next.js ↔ API wiring audit
        run: python3 scripts/audit_orphan_endpoints.py --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke + axe (Playwright)
        env:
          CI: "true"
        run: npm run test:e2e
