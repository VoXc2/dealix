name: security-privacy

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Security + privacy gates
        run: python scripts/checks/check_security_privacy_gates.py
      - name: Founder security review (read-only)
        run: python dealix.py security-check
