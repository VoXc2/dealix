name: Security & Privacy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Untrusted-data, suppression, no-auto-send, no-invented-contacts, secret-scan
        run: python scripts/checks/check_security_privacy_gates.py
