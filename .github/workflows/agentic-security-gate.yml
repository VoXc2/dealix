name: Agentic Security Gate

# Master safety gate. Least-privilege, no secrets, dry-run only.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install --quiet pytest pyyaml
      - name: Workflow least-privilege check
        run: python3 scripts/check_workflow_security.py
      - name: Secret scan (high-signal)
        run: python3 scripts/scan_secrets.py
      - name: Safety engine + evals
        run: pytest -q
      - name: Governance compliance (informational)
        run: python3 scripts/governance_check.py || echo "governance findings present (non-blocking)"
      - name: Agent docs drift check
        run: |
          python3 scripts/generate_agent_docs.py
          git diff --exit-code -- docs/agents || \
            (echo "::error::Agent docs are stale. Run scripts/generate_agent_docs.py and commit." && exit 1)
