name: Weekly Founder Content

# Sunday 06:00 UTC — weekly LinkedIn drafts → approval queue (no live publish).

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Generate weekly content drafts
        run: python scripts/generate_weekly_content_drafts.py --count 5

      - name: Queue drafts for approval (API if secrets set)
        env:
          DEALIX_API_BASE: ${{ secrets.DEALIX_API_BASE }}
          DEALIX_ADMIN_API_KEY: ${{ secrets.DEALIX_ADMIN_API_KEY }}
        run: |
          if [ -n "$DEALIX_API_BASE" ] && [ -n "$DEALIX_ADMIN_API_KEY" ]; then
            python scripts/queue_content_drafts_for_approval.py --use-http
          else
            python scripts/queue_content_drafts_for_approval.py || true
            echo "SKIP HTTP queue — no DEALIX_API_BASE / DEALIX_ADMIN_API_KEY"
          fi

      - name: Export markdown pack
        run: python scripts/generate_commercial_content_pack.py --skip-weekly-json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-content-${{ github.run_id }}
          path: |
            var/content_drafts/
            docs/commercial/operations/drafts/
          retention-days: 21
          if-no-files-found: ignore
