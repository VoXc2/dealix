name: architecture-guard

on:
  push:
    branches: [main, dealix-v3-autonomous-revenue-os, "claude/**"]
  pull_request:
    branches: [main, dealix-v3-autonomous-revenue-os]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx respx

      - name: Repo architecture audit
        env:
          APP_ENV: test
        run: python scripts/repo_architecture_audit.py

      - name: Launch readiness check
        env:
          APP_ENV: test
          ANTHROPIC_API_KEY: test-anthropic-key
          DEEPSEEK_API_KEY: test-deepseek-key
          GROQ_API_KEY: test-groq-key
          GLM_API_KEY: test-glm-key
          GOOGLE_API_KEY: test-google-key
          WHATSAPP_ALLOW_LIVE_SEND: "false"
          GMAIL_ALLOW_LIVE_SEND: "false"
          MOYASAR_ALLOW_LIVE_CHARGE: "false"
          LINKEDIN_ALLOW_AUTO_DM: "false"
        run: python scripts/launch_readiness_check.py

      - name: Architecture tests
        env:
          APP_ENV: test
          ANTHROPIC_API_KEY: test-anthropic-key
        run: pytest tests/architecture/ -q --no-cov
