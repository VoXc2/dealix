name: Scale Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scale-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/checks/check_agent_governance.py
      - run: python scripts/checks/check_deliverability_readiness.py
      - run: python scripts/checks/check_delivery_capacity.py
      - run: python scripts/checks/check_revenue_experiments.py
      - run: python scripts/checks/check_scale_readiness.py
