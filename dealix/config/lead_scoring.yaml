# Lead scoring weights (reference). Tune in ops; tests should lock invariants.
rules:
  positive:
    title_founder_exec: 4  # CEO / Founder / COO / CRO / Head Ops
    b2b_company: 3
    crm_or_pipeline: 3
    uses_or_plans_ai: 3
    saudi_or_gcc: 2
    urgent_within_30d: 2
    budget_5k_plus_sar: 2
    partner_or_referral_potential: 2
