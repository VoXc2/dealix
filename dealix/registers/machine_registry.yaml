# ═══════════════════════════════════════════════════════════════════
# Machine Registry — Dealix Execution Assurance System
# ═══════════════════════════════════════════════════════════════════
# Every operational "machine" is declared here with a goal, owner,
# inputs, outputs, KPIs, Definition of Done, failure modes, an honest
# 0-5 maturity score, and an acceptance gate.
#
# This register IS the assurance state. It is read by:
#   - the scorecard engine (auto_client_acquisition/execution_assurance_os)
#   - the read-only API (api/routers/execution_assurance.py)
#   - the Weekly CEO Review and Monthly Quality Audit scripts
#   - CI (tests/assurance/test_registry_invariants.py)
#
# NO FAKE GREEN. A Definition-of-Done item may only set `met: true`
# if it carries a concrete `evidence_ref` (a file path or artifact).
# A machine's maturity_score must be earned, not assumed.
#
# Maturity ladder (0-5):
#   0  Absent          — does not exist
#   1  Manual          — exists but run by hand, no automation
#   2  Partial         — exists with templates, not automated end-to-end
#   3  Automated       — runs internally, not yet measured or approval-gated
#   4  Governed        — automated + measured + approval gates in place
#   5  Self-improving  — automated + measured + governed + learns from failure
#
# Update by editing this YAML and opening a PR. Do not edit Python.
# ═══════════════════════════════════════════════════════════════════

schema_version: "1.0"
last_reviewed: "2026-05-17"

maturity_levels:
  0: "Absent — does not exist"
  1: "Manual — exists but run by hand, no automation"
  2: "Partial — exists with templates, not automated end-to-end"
  3: "Automated — runs internally, not yet measured or approval-gated"
  4: "Governed — automated + measured + approval gates in place"
  5: "Self-improving — automated + measured + governed + learns from failure"

machines:

  # ───────────────────────── Sales Autopilot ─────────────────────────
  - id: sales_autopilot
    name: "Sales Autopilot"
    goal: "Turn target accounts into qualified, staged, scored pipeline with a clear next action — without auto-sending anything external."
    owner: "founder"
    inputs:
      - "Inbound leads (landing page, risk-score form, referral, manual)"
      - "ICP definition"
      - "Lead signals (sector, region, role, budget, urgency, tooling)"
    outputs:
      - "Scored lead with stage and next action"
      - "Meeting brief drafts for qualified leads"
      - "Scope drafts and invoice drafts queued for founder approval"
    kpis:
      - name: "lead_capture_success_rate"
        target: "95"
        unit: "percent"
        current: null
      - name: "lead_scoring_coverage"
        target: "100"
        unit: "percent"
        current: null
      - name: "qualified_lead_response_time"
        target: "24"
        unit: "hours_max"
        current: null
      - name: "high_risk_auto_send"
        target: "0"
        unit: "percent"
        current: null
    scorecard_target: 4
    maturity_score: 3
    maturity_rationale: "Intake, ICP scoring, stage machine and approval-gated drafting exist in code; not yet fully measured against KPI targets, so not yet level 4."
    definition_of_done:
      - id: sales_dod_1
        text: "Any lead that enters is recorded automatically"
        met: true
        evidence_ref: "auto_client_acquisition/pipeline.py"
      - id: sales_dod_2
        text: "Every lead receives a score"
        met: true
        evidence_ref: "auto_client_acquisition/icp_scorer.py"
      - id: sales_dod_3
        text: "Every lead is placed in a pipeline stage"
        met: true
        evidence_ref: "auto_client_acquisition/crm_v10/stage_machine.py"
      - id: sales_dod_4
        text: "Every lead has a next action"
        met: true
        evidence_ref: "auto_client_acquisition/full_ops_contracts/schemas.py::LeadOpsRecord.next_action"
      - id: sales_dod_5
        text: "Qualified-A leads generate a meeting draft"
        met: true
        evidence_ref: "auto_client_acquisition/full_ops_contracts/schemas.py::LeadOpsRecord.draft_id"
      - id: sales_dod_6
        text: "Every meeting produces a brief"
        met: false
        evidence_ref: ""
      - id: sales_dod_7
        text: "meeting_done is not accepted without notes"
        met: false
        evidence_ref: ""
      - id: sales_dod_8
        text: "scope_requested generates a scope draft"
        met: false
        evidence_ref: ""
      - id: sales_dod_9
        text: "Invoices are not sent without approval"
        met: true
        evidence_ref: "auto_client_acquisition/finance_os/guardrails.py"
      - id: sales_dod_10
        text: "invoice_paid starts delivery automatically"
        met: false
        evidence_ref: ""
    failure_modes:
      - "Lead enters but is never scored (silent drop)"
      - "Weak lead misclassified as qualified, interrupting the founder"
      - "Draft auto-sent to an external channel without approval"
      - "Invoice sent before scope is approved"
    nist:
      govern: "Founder owns the pipeline; all external sends require approval; cold WhatsApp and LinkedIn automation are forbidden."
      map: "Events: lead_captured, message_prepared, message_sent, meeting_booked, meeting_done, scope_requested. Risk concentrated at external-send and invoice steps."
      measure: "Lead capture rate, scoring coverage, qualified response time, high-risk auto-send rate."
      manage: "Bottlenecks routed to Weekly CEO Review; misclassification feeds back into ICP scoring thresholds."
    acceptance_gate:
      - "10 test leads processed, 100% scored"
      - "100% of test leads assigned a stage"
      - "100% of test leads have a next action"
      - "0 high-risk auto-sends"
    evidence_event_names:
      - lead_captured
      - message_prepared
      - message_sent
      - meeting_booked
      - meeting_done
      - scope_requested
    approval_required_actions:
      - "message_sent"
      - "invoice_sent"
      - "scope_sent"

  # ──────────────────────── Support Autopilot ────────────────────────
  - id: support_autopilot
    name: "Support Autopilot"
    goal: "Answer low-risk questions instantly from a sourced knowledge base and escalate high-risk questions to the founder."
    owner: "founder"
    inputs:
      - "Support tickets and inbound questions"
      - "Knowledge Base articles"
    outputs:
      - "Sourced auto-answers for low-risk questions"
      - "Escalations with a safe draft for high-risk questions"
      - "Knowledge-gap entries for unanswered questions"
    kpis:
      - name: "support_auto_resolution_rate"
        target: "40-60"
        unit: "percent"
        current: null
      - name: "support_escalation_accuracy"
        target: "100"
        unit: "percent"
        current: null
      - name: "high_risk_auto_send"
        target: "0"
        unit: "percent"
        current: null
    scorecard_target: 4
    maturity_score: 3
    maturity_rationale: "Ticket intake and intent classification exist in support_os; KB sourcing and the gap loop are partially wired and not yet measured."
    definition_of_done:
      - id: support_dod_1
        text: "Every ticket is classified by intent"
        met: true
        evidence_ref: "auto_client_acquisition/support_os"
      - id: support_dod_2
        text: "The system searches the Knowledge Base for an answer"
        met: false
        evidence_ref: ""
      - id: support_dod_3
        text: "Low-risk questions receive an auto-answer"
        met: false
        evidence_ref: ""
      - id: support_dod_4
        text: "High-risk questions are escalated, not auto-answered"
        met: true
        evidence_ref: "auto_client_acquisition/governance_os/policy_check.py::policy_check_draft"
      - id: support_dod_5
        text: "Every reply carries a source"
        met: false
        evidence_ref: ""
      - id: support_dod_6
        text: "Every unanswered question generates a knowledge gap"
        met: false
        evidence_ref: ""
      - id: support_dod_7
        text: "No security, compliance or refund answer is sent without approval"
        met: true
        evidence_ref: "auto_client_acquisition/governance_os/policy_check.py::policy_check_draft"
    failure_modes:
      - "High-risk question auto-answered without escalation"
      - "Answer given with no source (un-sourced claim)"
      - "Knowledge gap not logged, so the same question recurs"
    nist:
      govern: "Founder approves all high-risk answers; no source means no answer."
      map: "Events: ticket_received, ticket_answered, ticket_escalated, knowledge_gap_logged. Risk concentrated at the auto-answer decision."
      measure: "Auto-resolution rate, escalation accuracy, high-risk auto-send rate."
      manage: "Knowledge gaps feed KB updates reviewed in the Monthly Quality Audit."
    acceptance_gate:
      - "30 FAQ questions tested"
      - "80% answered from the Knowledge Base"
      - "100% of high-risk questions escalated"
      - "0 un-sourced claims"
    evidence_event_names:
      - ticket_received
      - ticket_answered
      - ticket_escalated
      - knowledge_gap_logged
    approval_required_actions:
      - "high_risk_answer_sent"
      - "security_claim_sent"
      - "refund_decision"

  # ──────────────────────── Marketing Factory ────────────────────────
  - id: marketing_factory
    name: "Marketing Factory"
