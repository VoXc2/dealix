  # ─────────────────────────── Billing Ops ───────────────────────────
  - id: billing_ops
    name: "Billing Ops"
    goal: "Issue invoices only after an approved scope, and recognize revenue only after invoice_paid."
    owner: "founder"
    inputs:
      - "Approved scopes"
      - "Payment evidence"
    outputs:
      - "Draft invoices queued for approval"
      - "Confirmed revenue with payment proof"
    kpis:
      - name: "scope_to_invoice_conversion"
        target: "tracked"
        unit: "percent"
        current: null
      - name: "invoice_to_paid_conversion"
        target: "tracked"
        unit: "percent"
        current: null
      - name: "revenue_before_paid"
        target: "0"
        unit: "count"
        current: null
    scorecard_target: 4
    maturity_score: 3
    maturity_rationale: "finance_os guardrails block live charge and fake revenue; invoices are draft-only with approval_required. Not yet measured against conversion targets."
    definition_of_done:
      - id: billing_dod_1
        text: "No invoice is sent without an approved scope"
        met: true
        evidence_ref: "auto_client_acquisition/finance_os/guardrails.py"
      - id: billing_dod_2
        text: "No live charge happens automatically"
        met: true
        evidence_ref: "auto_client_acquisition/finance_os/guardrails.py::is_live_charge_allowed"
      - id: billing_dod_3
        text: "Revenue is recognized only after payment_confirmed"
        met: true
        evidence_ref: "auto_client_acquisition/full_ops_contracts/schemas.py::PaymentStateRecord"
      - id: billing_dod_4
        text: "Every invoice requires founder approval"
        met: true
        evidence_ref: "auto_client_acquisition/finance_os/guardrails.py"
      - id: billing_dod_5
        text: "Payment evidence is required before confirmation"
        met: true
        evidence_ref: "auto_client_acquisition/full_ops_contracts/schemas.py::PaymentStateRecord.evidence_reference"
      - id: billing_dod_6
        text: "Invoices are ZATCA-compliant"
        met: false
        evidence_ref: ""
    failure_modes:
      - "Invoice sent before scope is approved"
      - "Revenue counted before invoice_paid (fake revenue)"
      - "Live charge attempted automatically"
    nist:
      govern: "No invoice without approved scope; no revenue before payment_confirmed; no auto-charge anywhere."
      map: "Events: invoice_sent, invoice_paid. Risk concentrated in early revenue recognition."
      measure: "Scope-to-invoice conversion, invoice-to-paid conversion, revenue-before-paid count."
      manage: "Payment-friction bottlenecks routed to the Weekly CEO Review."
    acceptance_gate:
      - "Invoice guard blocks invoice without approved scope"
      - "Revenue guard blocks revenue before invoice_paid"
      - "No auto-charge path exists"
    evidence_event_names:
      - invoice_sent
      - invoice_paid
    approval_required_actions:
      - "invoice_sent"
      - "payment_terms_change"

  # ──────────────────────── Governance Layer ─────────────────────────
  - id: governance_layer
    name: "Governance Layer"
    goal: "Ensure no external or high-risk action happens without approval, a source, or evidence."
    owner: "founder"
    inputs:
      - "Draft actions, claims, scopes, invoices, case studies"
    outputs:
      - "Approval decisions with status and reason"
      - "Policy verdicts and blocked-action records"
    kpis:
      - name: "approval_compliance_rate"
        target: "100"
        unit: "percent"
        current: null
      - name: "high_risk_auto_send"
        target: "0"
        unit: "percent"
        current: null
      - name: "unsourced_claims"
        target: "0"
        unit: "count"
        current: null
    scorecard_target: 5
    maturity_score: 4
    maturity_rationale: "governance_os, the approval center and finance guardrails enforce approval and claim gates with audit history; the self-improving loop from failures is not yet automated."
    definition_of_done:
      - id: gov_dod_1
