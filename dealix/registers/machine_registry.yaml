      - "Lead magnets that generate leads"
      - "A weekly content calendar"
    kpis:
      - name: "qualified_leads_from_content"
        target: "tracked"
        unit: "count"
        current: null
      - name: "lead_magnet_conversion"
        target: "tracked"
        unit: "percent"
        current: null
      - name: "content_calendar_coverage"
        target: "100"
        unit: "percent"
        current: null
    scorecard_target: 3
    maturity_score: 1
    maturity_rationale: "Marketing exists only as documentation today; no automated content pipeline, no UTM-to-lead wiring. Honestly level 1, not green."
    definition_of_done:
      - id: marketing_dod_1
        text: "Every content asset has a CTA"
        met: false
        evidence_ref: ""
      - id: marketing_dod_2
        text: "Every CTA is wired to a UTM"
        met: false
        evidence_ref: ""
      - id: marketing_dod_3
        text: "Every lead magnet generates a lead"
        met: false
        evidence_ref: ""
      - id: marketing_dod_4
        text: "Every key post is repurposed into a snippet, email or short video"
        met: false
        evidence_ref: ""
      - id: marketing_dod_5
        text: "There is a content calendar every week"
        met: false
        evidence_ref: ""
      - id: marketing_dod_6
        text: "Every sales objection is turned into content"
        met: false
        evidence_ref: ""
      - id: marketing_dod_7
        text: "Content is measured by qualified leads, not likes"
        met: false
        evidence_ref: ""
    failure_modes:
      - "Content produced with no CTA, so it cannot convert"
      - "Traffic with no UTM, so attribution is impossible"
      - "Measuring likes instead of qualified leads"
    nist:
      govern: "Founder owns the content calendar; no guaranteed-outcome claims in any asset."
      map: "Events: content_published, lead_captured. Risk concentrated in un-attributed traffic and overclaiming."
      measure: "Qualified leads from content, lead-magnet conversion, calendar coverage."
      manage: "Underperforming channels are flagged for Kill / Improve decisions in the Weekly CEO Review."
    acceptance_gate:
      - "Lead magnet live"
      - "UTM tracking live"
      - "Content calendar ready"
      - "Email sequence ready"
    evidence_event_names:
      - content_published
      - lead_captured
    approval_required_actions:
      - "content_published"
      - "market_facing_statement"

