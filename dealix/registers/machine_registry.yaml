      - "Co-delivery agreed without an approved scope"
    nist:
      govern: "Founder approves all partner agreements; no contract auto-execution."
      map: "Events: partner_application. Risk concentrated in agreements and commitments."
      measure: "Partners with a status, partners with a next action."
      manage: "Stale partners surfaced in the Weekly CEO Review."
    acceptance_gate:
