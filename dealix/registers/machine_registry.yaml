      - "Co-delivery and referral arrangements"
    kpis:
      - name: "partners_with_status"
        target: "100"
        unit: "percent"
        current: null
      - name: "partners_with_next_action"
        target: "100"
        unit: "percent"
        current: null
    scorecard_target: 3
    maturity_score: 2
    maturity_rationale: "partnership_os exists with a partner-application endpoint; status and next-action tracking are partial and template-based, not automated."
    definition_of_done:
      - id: partner_dod_1
        text: "Every partner has a status"
        met: true
        evidence_ref: "auto_client_acquisition/partnership_os"
      - id: partner_dod_2
        text: "Every partner has a next action"
        met: false
        evidence_ref: ""
      - id: partner_dod_3
        text: "A partner application intake exists"
        met: true
        evidence_ref: "auto_client_acquisition/partnership_os"
      - id: partner_dod_4
