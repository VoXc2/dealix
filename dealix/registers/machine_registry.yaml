      - "Commission paid before invoice_paid"
      - "Referral published with no disclosure"
    nist:
      govern: "Disclosure is mandatory; misleading claims block payout; founder approves messaging."
      map: "Events: affiliate_referral, commission_calculated, compliance_violation. Risk concentrated in claims and early payout."
