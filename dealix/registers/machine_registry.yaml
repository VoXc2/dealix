      - "Proof packs and case-study candidates"
      - "Client publication consent"
    outputs:
      - "Media assets cleared for publication"
    kpis:
      - name: "media_assets_with_consent"
        target: "100"
        unit: "percent"
        current: null
      - name: "overclaim_violations"
        target: "0"
        unit: "count"
        current: null
    scorecard_target: 3
    maturity_score: 1
    maturity_rationale: "Media production exists only as documentation; no automated asset pipeline. Honestly level 1."
    definition_of_done:
      - id: media_dod_1
        text: "Every media asset is built from a real proof event"
        met: false
        evidence_ref: ""
      - id: media_dod_2
