    owner: "founder"
    inputs:
      - "Paid engagements (invoice_paid)"
      - "Customer onboarding data and Source Passport"
    outputs:
      - "Delivery checklist per engagement"
      - "Proof pack with sourced findings and an upsell recommendation"
    kpis:
      - name: "paid_to_checklist_rate"
        target: "100"
        unit: "percent"
        current: null
      - name: "proof_pack_score"
        target: "70"
        unit: "min_score"
        current: null
      - name: "findings_with_source"
        target: "100"
        unit: "percent"
        current: null
    scorecard_target: 4
    maturity_score: 3
    maturity_rationale: "delivery_factory and the 7-day sprint playbook exist in code; proof-pack scoring exists; not yet fully measured against KPI targets."
    definition_of_done:
      - id: delivery_dod_1
        text: "Every paid diagnostic becomes a delivery checklist"
        met: true
        evidence_ref: "auto_client_acquisition/delivery_factory"
      - id: delivery_dod_2
        text: "Every engagement produces a proof pack"
        met: true
        evidence_ref: "api/routers/proof_pack_governed.py"
      - id: delivery_dod_3
        text: "Every finding in the proof pack has a source"
        met: true
        evidence_ref: "api/routers/proof_pack_governed.py"
      - id: delivery_dod_4
        text: "A missing-data flow exists for incomplete inputs"
        met: false
        evidence_ref: ""
      - id: delivery_dod_5
        text: "Every proof pack carries an upsell recommendation"
        met: false
        evidence_ref: ""
      - id: delivery_dod_6
        text: "Delivery does not start before payment_confirmed"
        met: true
        evidence_ref: "auto_client_acquisition/business_ops/stage_definitions.py"
    failure_modes:
      - "Delivery started before payment is confirmed"
      - "Proof pack finding stated with no source"
      - "Incomplete input data delivered as if complete"
    nist:
      govern: "No delivery before payment_confirmed; no fake results; no public proof without client permission."
      map: "Events: delivery_kickoff, proof_pack_assembled, proof_pack_sent. Risk concentrated in unsourced findings."
      measure: "Paid-to-checklist rate, proof-pack score, findings-with-source rate."
      manage: "Low proof-pack scores feed a delivery audit in the Monthly Quality Audit."
    acceptance_gate:
      - "Onboarding form ready"
      - "Diagnostic checklist ready"
      - "Proof pack template ready"
      - "Missing-data flow ready"
      - "Upsell recommendation ready"
    evidence_event_names:
      - delivery_kickoff
      - proof_pack_assembled
      - proof_pack_sent
      - upsell_candidate
    approval_required_actions:
