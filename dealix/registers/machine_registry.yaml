      - "Commissions calculated only after invoice_paid"
      - "Compliance flags that stop payout on violation"
    kpis:
      - name: "affiliate_disclosure_rate"
        target: "100"
        unit: "percent"
        current: null
      - name: "commission_after_paid_only"
        target: "100"
        unit: "percent"
        current: null
      - name: "compliance_violations_open"
        target: "0"
        unit: "count"
        current: null
    scorecard_target: 4
    maturity_score: 1
    maturity_rationale: "Affiliate program exists only as documentation; no referral tracking or commission engine in code. Honestly level 1."
    definition_of_done:
      - id: affiliate_dod_1
        text: "A partner application exists"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_2
        text: "Affiliate scoring exists"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_3
        text: "Approved messaging exists"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_4
        text: "Forbidden claims are clearly defined"
        met: true
        evidence_ref: "auto_client_acquisition/governance_os/policy_check.py::policy_check_draft"
      - id: affiliate_dod_5
        text: "Each affiliate has a referral code"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_6
        text: "Commission is calculated only after invoice_paid"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_7
        text: "Disclosure is required and enforced"
        met: false
        evidence_ref: ""
      - id: affiliate_dod_8
        text: "Compliance violations stop the commission"
        met: false
        evidence_ref: ""
