      - id: media_dod_3
        text: "No overclaiming — every claim is sourced"
        met: true
        evidence_ref: "dealix/registers/no_overclaim.yaml"
      - id: media_dod_4
        text: "Every asset is approved before publication"
        met: false
        evidence_ref: ""
    failure_modes:
      - "Client data leaked into a public asset"
      - "Asset publishes an unsourced or guaranteed-outcome claim"
    nist:
      govern: "No publication without client consent and founder approval; claims tracked in the no-overclaim register."
      map: "Events: content_published. Risk concentrated in consent and overclaiming."
      measure: "Assets with consent, overclaim violations."
      manage: "Overclaim violations feed the Monthly Quality Audit."
    acceptance_gate:
      - "Consent gate enforced before publication"
      - "Approval gate enforced before publication"
      - "0 overclaim violations"
    evidence_event_names:
      - content_published
      - approval_requested
    approval_required_actions:
