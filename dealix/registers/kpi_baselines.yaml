# ═══════════════════════════════════════════════════════════════════
# KPI Baselines Register
# سجل خطوط الأساس لمؤشرات الأداء
# ═══════════════════════════════════════════════════════════════════
# Gate 4 of the commercial doctrine: "fill truth, not hope".
# Every KPI here ships EMPTY until it has a real source. A `value` MUST
# NOT be set unless `source_ref` is also set (verified by
# scripts/verify_global_ai_transformation.py).
#
# Field contract per KPI:
#   value            — the measured number, or null if not yet measured
#   unit             — unit of measure (informational)
#   source_ref       — system/report the number was read from (CRM, finance,
#                       delivery ledger); null until a real source exists
#   owner            — person accountable for keeping it current; null = TBD
#   last_verified_at — ISO date the value was last confirmed; null if never
#   reason           — why value is null (required while value is null)
#
# Rule: never invent a number. An honest null beats a fabricated KPI.
# ═══════════════════════════════════════════════════════════════════

