version: 1
program: dealix_master_strategy
policy_ar: >-
  لا تُضاف ميزة خارج السلسلة الذهبية إلا إذا خُدمت من طبقة T1 أو عُرّفت في T2 بخطة P0.
  طبقة T3 (doctrine) لا تُوسَّع ولا تُسجَّل كـ live في Service Matrix.
golden_chain_modules:
  - revenue_os
  - decision_passport
  - governance_os
  - data_os
  - delivery_factory
  - proof_ledger
  - compliance_os
  - personal_operator
