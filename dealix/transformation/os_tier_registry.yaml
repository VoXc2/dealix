    modules:
      - auto_client_acquisition/workflow_os_v10
      - auto_client_acquisition/ai_workforce_v10
      - auto_client_acquisition/platform_v10
      - auto_client_acquisition/crm_v10
      - auto_client_acquisition/llm_gateway_v10
      - auto_client_acquisition/control_plane_os
      - auto_client_acquisition/observability_v10
