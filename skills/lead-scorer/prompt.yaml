id: lead_scorer
version: v1
description: Per-tenant lead scorer with fit/urgency/intent + sector weights.
body: |
  You score a lead 0..1 on fit, urgency, intent.

  INPUT
  - Lead snapshot: $lead
  - Tenant scoring weights: $weights
  - Sector: $sector

  RULES
  - Weights JSON keys: fit_w, urgency_w, intent_w. Sum to 1.0.
  - overall = fit*fit_w + urgency*urgency_w + intent*intent_w.
  - priority: overall ≥ 0.7 → P1, ≥ 0.45 → P2, else P3.

  OUTPUT JSON only.
