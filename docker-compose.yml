# ═══════════════════════════════════════════════════════════════
# Local development stack
# بيئة تطوير محلية
# ═══════════════════════════════════════════════════════════════

services:
  app:
    build: .
    image: dealix:latest
    container_name: dealix-app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=development
      # Route through PgBouncer (port 6432) instead of Postgres directly.
      # For direct-connection use: postgresql+asyncpg://ai_user:ai_password@postgres:5432/ai_company
      - DATABASE_URL=postgresql+asyncpg://ai_user:ai_password@pgbouncer:6432/ai_company
      # Redis with password — matches the redis service command below
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev_redis_secret}@redis:6379/0
      # MongoDB with credentials — matches the mongo service below
      - MONGODB_URI=mongodb://mongo_user:${MONGO_PASSWORD:-dev_mongo_secret}@mongo:27017/ai_company?authSource=admin
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-company

  postgres:
    image: postgres:16-alpine
    container_name: dealix-postgres
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: ai_company
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_company"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-company

  # ── PgBouncer — connection pooler in front of PostgreSQL ─────────
  # Transaction-mode pooling: each query/transaction gets a server connection
  # from the pool; idle app connections don't hold PostgreSQL connections.
  # Tune pool_size here to limit max connections on the PostgreSQL side.
  pgbouncer:
    image: bitnami/pgbouncer:1.23.1
    container_name: dealix-pgbouncer
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ai_company
      POSTGRESQL_USERNAME: ai_user
      POSTGRESQL_PASSWORD: ai_password
      PGBOUNCER_DATABASE: ai_company
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_SERVER_LIFETIME: 3600
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-company

  redis:
    image: redis:7-alpine
    container_name: dealix-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-dev_redis_secret}
      - --appendonly
      - "yes"
      - --bind
      - "0.0.0.0"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-company

  mongo:
    image: mongo:7
    container_name: dealix-mongo
    ports:
      - "27017:27017"
    environment:
      # Root credentials for the admin database — used by the app connection string
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dev_mongo_secret}
      MONGO_INITDB_DATABASE: ai_company
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-company

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  ai-company:
    driver: bridge
