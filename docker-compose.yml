services:
  mysql:
    image: mysql:8.0
    container_name: dealix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-dealix_root_2026}
      MYSQL_DATABASE: ${DB_NAME:-dealix}
      MYSQL_USER: ${DB_USER:-dealix}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dealix_pass_2026}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dealix-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-dealix}:${DB_PASSWORD:-dealix_pass_2026}@mysql:3306/${DB_NAME:-dealix}
      # Safety defaults — never override without explicit approval
      EXTERNAL_SEND_ENABLED: "false"
      EMAIL_SEND_ENABLED: "false"
      WHATSAPP_SEND_ENABLED: "false"
      WHATSAPP_ALLOW_LIVE_SEND: "false"
      SMS_SEND_ENABLED: "false"
      OUTBOUND_MODE: draft_only
      WHATSAPP_AGENT_MODE: dry_run
      # Auth — set in .env or override
      APP_ID: ${APP_ID:-}
      APP_SECRET: ${APP_SECRET:-}
      # WhatsApp — set in .env or override
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  mysql_data:
