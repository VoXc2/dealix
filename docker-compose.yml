# Dealix — Docker Compose (التطوير المحلي)
# ═══════════════════════════════════════════════════════════════════════
# للإنتاج: استخدم docker-compose.prod.yml أو Kubernetes/Helm
# انسخ .env.example إلى .env أولاً: cp .env.example .env
# ═══════════════════════════════════════════════════════════════════════

name: dealix

services:
  # ─── PostgreSQL 16 ───
  db:
    image: postgres:16-alpine
    container_name: dealix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dealix}
      POSTGRES_USER: ${POSTGRES_USER:-dealix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dealix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ───
  redis:
    image: redis:7-alpine
    container_name: dealix-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealix-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dealix:change-me-in-production@db:5432/dealix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-32-chars-in-production}
      DEALIX_INTERNAL_API_TOKEN: ${DEALIX_INTERNAL_API_TOKEN:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Celery Worker ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealix-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dealix:change-me-in-production@db:5432/dealix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-32-chars-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat (scheduler) ───
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealix-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat -l info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dealix:change-me-in-production@db:5432/dealix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-32-chars-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - redis

  # ─── Frontend (Next.js) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dealix-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-ar}
    depends_on:
      - backend

volumes:
  postgres_data:
    name: dealix_postgres_data
  redis_data:
    name: dealix_redis_data

networks:
  default:
    name: dealix_network
