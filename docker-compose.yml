version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: dealix-db
    environment:
      POSTGRES_USER: dealix
      POSTGRES_PASSWORD: dealix_password
      POSTGRES_DB: dealix_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: dealix-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dealix:dealix_password@db/dealix_db
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: dealix-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
